<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#F6F4EF;font-family:'Figtree',system-ui,sans-serif;color:#3C4038;-webkit-font-smoothing:antialiased}
a{color:#2E7D4F;text-decoration:none}
a:hover{color:#1E4D33}
*{box-sizing:border-box}
input::placeholder{color:#A5A294}
</style>
</helmet>

<div style="min-height:100vh;display:flex" data-screen-label="User Management">

  <aside style="width:248px;flex-shrink:0;background:#1E2B22;display:flex;flex-direction:column;position:sticky;top:0;height:100vh">
    <a href="Landing.dc.html" style="display:flex;align-items:center;gap:10px;padding:22px 22px 18px">
      <div style="width:32px;height:32px;border-radius:9px;background:#2E7D4F;color:#FFFFFF;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px">C</div>
      <div style="font-weight:700;font-size:16px;color:#FFFFFF;letter-spacing:-0.01em">CommunityConnect</div>
    </a>
    <div style="padding:0 22px 14px;font-size:11px;font-weight:700;color:#7E9184;text-transform:uppercase;letter-spacing:0.08em">Admin</div>
    <nav style="display:flex;flex-direction:column;gap:2px;padding:0 12px">
      <a href="Admin Dashboard.dc.html" style="padding:10px 12px;border-radius:9px;color:#C4D2C7;font-weight:500;font-size:14px" style-hover="background:#28382D;color:#FFFFFF">Dashboard</a>
      <a href="User Management.dc.html" style="padding:10px 12px;border-radius:9px;background:#2E7D4F;color:#FFFFFF;font-weight:600;font-size:14px">User Management</a>
      <a href="Categories.dc.html" style="padding:10px 12px;border-radius:9px;color:#C4D2C7;font-weight:500;font-size:14px" style-hover="background:#28382D;color:#FFFFFF">Event Categories</a>
      <a href="Reports.dc.html" style="padding:10px 12px;border-radius:9px;color:#C4D2C7;font-weight:500;font-size:14px" style-hover="background:#28382D;color:#FFFFFF">System Reports</a>
    </nav>
    <div style="margin-top:auto;padding:16px;display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:11px;background:#28382D">
        <div style="width:34px;height:34px;border-radius:50%;background:#C08FBB;color:#1E2B22;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px">SR</div>
        <div style="display:flex;flex-direction:column;min-width:0">
          <span style="font-size:13.5px;font-weight:600;color:#FFFFFF">Siti Rahman</span>
          <span style="font-size:12px;color:#7E9184">Administrator</span>
        </div>
      </div>
      <a href="Landing.dc.html" style="text-align:center;padding:8px 0;border-radius:9px;font-size:13px;font-weight:600;color:#C4D2C7;border:1px solid #3A4B3F" style-hover="background:#28382D;color:#FFFFFF">Log out</a>
    </div>
  </aside>

  <main style="flex:1;min-width:0;display:flex;flex-direction:column">
    <div style="background:#FFFFFF;border-bottom:1px solid #E6E2D8;padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between">
      <h1 style="margin:0;font-size:19px;font-weight:700;color:#23271F">User Management</h1>
      <button style="padding:9px 16px;border-radius:10px;background:#2E7D4F;color:#FFFFFF;font-weight:600;font-size:13.5px;border:none;cursor:pointer;font-family:inherit" style-hover="background:#256741">+ Add user</button>
    </div>

    <div style="padding:28px 32px 56px;display:flex;flex-direction:column;gap:18px">

      <div style="display:flex;gap:12px;align-items:center">
        <input type="text" placeholder="Search by name or email…" style="flex:1;max-width:340px;padding:10px 14px;border-radius:10px;border:1px solid #D8D4C8;font-size:14px;font-family:inherit;background:#FFFFFF;color:#23271F;outline:none" style-focus="border-color:#2E7D4F;box-shadow:0 0 0 3px #E7F2EA"></input>
        <select style="padding:10px 12px;border-radius:10px;border:1px solid #D8D4C8;font-size:14px;font-family:inherit;background:#FFFFFF;color:#23271F">
          <option>All roles</option><option>Volunteer</option><option>Organiser</option><option>Admin</option>
        </select>
        <select style="padding:10px 12px;border-radius:10px;border:1px solid #D8D4C8;font-size:14px;font-family:inherit;background:#FFFFFF;color:#23271F">
          <option>All statuses</option><option>Active</option><option>Pending approval</option><option>Suspended</option>
        </select>
        <span style="margin-left:auto;font-size:13.5px;color:#8B8778">1,318 users · showing 7</span>
      </div>

      <div style="background:#FFFFFF;border:1px solid #E6E2D8;border-radius:14px;overflow:hidden;box-shadow:0 1px 2px rgba(35,39,31,0.05)">
        <div style="display:grid;grid-template-columns:2fr 1.8fr 1fr 1.1fr 1fr 1.2fr;padding:12px 22px;background:#FBFAF6;border-bottom:1px solid #EDEAE0;font-size:12px;font-weight:700;color:#8B8778;text-transform:uppercase;letter-spacing:0.05em">
          <span>User</span><span>Email</span><span>Role</span><span>Joined</span><span>Status</span><span style="text-align:right">Actions</span>
        </div>
        <sc-for list="{{ rows }}" as="r" hint-placeholder-count="7">
          <div style="display:grid;grid-template-columns:2fr 1.8fr 1fr 1.1fr 1fr 1.2fr;padding:13px 22px;border-bottom:1px solid #F2EFE7;font-size:14px;align-items:center">
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:32px;height:32px;border-radius:50%;background:{{ r.avBg }};color:#1E2B22;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0">{{ r.initials }}</div>
              <span style="font-weight:600;color:#23271F">{{ r.name }}</span>
            </div>
            <span style="color:#6E7266;font-size:13px">{{ r.email }}</span>
            <span><span style="background:{{ r.roleBg }};color:{{ r.roleFg }};font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px">{{ r.role }}</span></span>
            <span style="color:#6E7266;font-size:13.5px">{{ r.joined }}</span>
            <span><span style="background:{{ r.stBg }};color:{{ r.stFg }};font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px">{{ r.status }}</span></span>
            <div style="display:flex;gap:6px;justify-content:flex-end">
              <button style="padding:7px 12px;border-radius:8px;border:1px solid #D8D4C8;color:#23271F;font-weight:600;font-size:12.5px;background:#FDFCFA;cursor:pointer;font-family:inherit" style-hover="background:#F6F4EF">Edit</button>
              <sc-if value="{{ r.pending }}" hint-placeholder-val="{{ false }}">
                <button style="padding:7px 12px;border-radius:8px;border:1px solid #BFDCC9;color:#1E4D33;font-weight:600;font-size:12.5px;background:#E7F2EA;cursor:pointer;font-family:inherit" style-hover="background:#D5E8DC">Approve</button>
              </sc-if>
              <sc-if value="{{ r.suspendable }}" hint-placeholder-val="{{ false }}">
                <button style="padding:7px 12px;border-radius:8px;border:1px solid #E8C7C4;color:#B0433B;font-weight:600;font-size:12.5px;background:#FFFFFF;cursor:pointer;font-family:inherit" style-hover="background:#FBEAE8">Suspend</button>
              </sc-if>
            </div>
          </div>
        </sc-for>
      </div>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const av = ["#D99E2B", "#7FA8D9", "#C08FBB", "#8FBF9A", "#D9A08F", "#B9C98F"];
    const ini = (n) => n.split(" ").map((p) => p[0]).slice(0, 2).join("").toUpperCase();
    const roleTone = { Volunteer: ["#E7F2EA", "#1E4D33"], Organiser: ["#E9EDF6", "#3B5384"], Admin: ["#F3E9F2", "#7A4472"] };
    const stTone = { Active: ["#E7F2EA", "#1E4D33"], "Pending": ["#FBF3DF", "#8A5E08"], Suspended: ["#FBEAE8", "#B0433B"] };
    const mk = (name, email, role, joined, status, i) => ({
      name, email, role, joined, status,
      initials: ini(name), avBg: av[i % av.length],
      roleBg: roleTone[role][0], roleFg: roleTone[role][1],
      stBg: stTone[status][0], stFg: stTone[status][1],
      pending: status === "Pending",
      suspendable: status === "Active",
    });
    return {
      rows: [
        mk("Tan Wei Ling", "weiling.tan@example.sg", "Volunteer", "14/01/2026", "Active", 0),
        mk("Marcus Lim", "marcus.lim@example.sg", "Organiser", "03/11/2025", "Active", 1),
        mk("Nurul Aisyah", "nurul.a@example.sg", "Volunteer", "22/02/2026", "Active", 2),
        mk("Grace Chua", "grace.chua@example.sg", "Organiser", "12/07/2026", "Pending", 3),
        mk("Rajesh Kumar", "rajesh.k@example.sg", "Volunteer", "08/03/2026", "Active", 4),
        mk("Jason Teo", "jason.teo@example.sg", "Volunteer", "19/05/2026", "Suspended", 5),
        mk("Siti Rahman", "siti.r@communityconnect.sg", "Admin", "01/09/2025", "Active", 2),
      ],
    };
  }
}
</script>
</body>
</html>
