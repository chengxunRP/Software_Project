<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#F6F4EF;font-family:'Figtree',system-ui,sans-serif;color:#3C4038;-webkit-font-smoothing:antialiased}
a{color:#2E7D4F;text-decoration:none}
a:hover{color:#1E4D33}
*{box-sizing:border-box}
input::placeholder{color:#A5A294}
</style>
</helmet>

<div style="min-height:100vh;display:flex" data-screen-label="Event Category Management">

  <aside style="width:248px;flex-shrink:0;background:#1E2B22;display:flex;flex-direction:column;position:sticky;top:0;height:100vh">
    <a href="Landing.dc.html" style="display:flex;align-items:center;gap:10px;padding:22px 22px 18px">
      <div style="width:32px;height:32px;border-radius:9px;background:#2E7D4F;color:#FFFFFF;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px">C</div>
      <div style="font-weight:700;font-size:16px;color:#FFFFFF;letter-spacing:-0.01em">CommunityConnect</div>
    </a>
    <div style="padding:0 22px 14px;font-size:11px;font-weight:700;color:#7E9184;text-transform:uppercase;letter-spacing:0.08em">Admin</div>
    <nav style="display:flex;flex-direction:column;gap:2px;padding:0 12px">
      <a href="Admin Dashboard.dc.html" style="padding:10px 12px;border-radius:9px;color:#C4D2C7;font-weight:500;font-size:14px" style-hover="background:#28382D;color:#FFFFFF">Dashboard</a>
      <a href="User Management.dc.html" style="padding:10px 12px;border-radius:9px;color:#C4D2C7;font-weight:500;font-size:14px" style-hover="background:#28382D;color:#FFFFFF">User Management</a>
      <a href="Categories.dc.html" style="padding:10px 12px;border-radius:9px;background:#2E7D4F;color:#FFFFFF;font-weight:600;font-size:14px">Event Categories</a>
      <a href="Reports.dc.html" style="padding:10px 12px;border-radius:9px;color:#C4D2C7;font-weight:500;font-size:14px" style-hover="background:#28382D;color:#FFFFFF">System Reports</a>
    </nav>
    <div style="margin-top:auto;padding:16px;display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:11px;background:#28382D">
        <div style="width:34px;height:34px;border-radius:50%;background:#C08FBB;color:#1E2B22;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px">SR</div>
        <div style="display:flex;flex-direction:column;min-width:0">
          <span style="font-size:13.5px;font-weight:600;color:#FFFFFF">Siti Rahman</span>
          <span style="font-size:12px;color:#7E9184">Administrator</span>
        </div>
      </div>
      <a href="Landing.dc.html" style="text-align:center;padding:8px 0;border-radius:9px;font-size:13px;font-weight:600;color:#C4D2C7;border:1px solid #3A4B3F" style-hover="background:#28382D;color:#FFFFFF">Log out</a>
    </div>
  </aside>

  <main style="flex:1;min-width:0;display:flex;flex-direction:column">
    <div style="background:#FFFFFF;border-bottom:1px solid #E6E2D8;padding:0 32px;height:64px;display:flex;align-items:center">
      <h1 style="margin:0;font-size:19px;font-weight:700;color:#23271F">Event Category Management</h1>
    </div>

    <div style="padding:28px 32px 56px;display:grid;grid-template-columns:1fr 340px;gap:24px;max-width:1040px;align-items:start">

      <!-- Category table -->
      <div style="background:#FFFFFF;border:1px solid #E6E2D8;border-radius:14px;overflow:hidden;box-shadow:0 1px 2px rgba(35,39,31,0.05)">
        <div style="display:grid;grid-template-columns:1.6fr 2.2fr 0.9fr 0.9fr 1.1fr;padding:12px 22px;background:#FBFAF6;border-bottom:1px solid #EDEAE0;font-size:12px;font-weight:700;color:#8B8778;text-transform:uppercase;letter-spacing:0.05em">
          <span>Category</span><span>Description</span><span>Events</span><span>Status</span><span style="text-align:right">Actions</span>
        </div>
        <sc-for list="{{ cats }}" as="c" hint-placeholder-count="6">
          <div style="display:grid;grid-template-columns:1.6fr 2.2fr 0.9fr 0.9fr 1.1fr;padding:14px 22px;border-bottom:1px solid #F2EFE7;font-size:14px;align-items:center">
            <div style="display:flex;align-items:center;gap:9px">
              <span style="width:12px;height:12px;border-radius:4px;background:{{ c.color }};flex-shrink:0"></span>
              <span style="font-weight:700;color:#23271F">{{ c.name }}</span>
            </div>
            <span style="color:#6E7266;font-size:13px;padding-right:14px">{{ c.desc }}</span>
            <span style="font-weight:600;color:#3C4038">{{ c.count }}</span>
            <span><span style="background:{{ c.stBg }};color:{{ c.stFg }};font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px">{{ c.status }}</span></span>
            <div style="display:flex;gap:6px;justify-content:flex-end">
              <button style="padding:7px 12px;border-radius:8px;border:1px solid #D8D4C8;color:#23271F;font-weight:600;font-size:12.5px;background:#FDFCFA;cursor:pointer;font-family:inherit" style-hover="background:#F6F4EF">Edit</button>
              <button style="padding:7px 12px;border-radius:8px;border:1px solid #D8D4C8;color:#6E7266;font-weight:600;font-size:12.5px;background:#FDFCFA;cursor:pointer;font-family:inherit" style-hover="background:#F6F4EF">{{ c.toggle }}</button>
            </div>
          </div>
        </sc-for>
      </div>

      <!-- Add category form -->
      <div style="background:#FFFFFF;border:1px solid #E6E2D8;border-radius:16px;padding:24px;display:flex;flex-direction:column;gap:16px;position:sticky;top:24px;box-shadow:0 1px 2px rgba(35,39,31,0.05)">
        <span style="font-size:15.5px;font-weight:700;color:#23271F">Add new category</span>
        <label style="display:flex;flex-direction:column;gap:6px">
          <span style="font-size:13.5px;font-weight:600;color:#23271F">Category name <span style="color:#B0433B">*</span></span>
          <input type="text" placeholder="e.g. Animal Welfare" style="padding:11px 14px;border-radius:10px;border:1px solid #D8D4C8;font-size:14.5px;font-family:inherit;background:#FDFCFA;color:#23271F;outline:none" style-focus="border-color:#2E7D4F;box-shadow:0 0 0 3px #E7F2EA"></input>
        </label>
        <label style="display:flex;flex-direction:column;gap:6px">
          <span style="font-size:13.5px;font-weight:600;color:#23271F">Description</span>
          <textarea rows="3" placeholder="Short description shown to organisers" style="padding:11px 14px;border-radius:10px;border:1px solid #D8D4C8;font-size:14.5px;font-family:inherit;background:#FDFCFA;color:#23271F;outline:none;resize:vertical" style-focus="border-color:#2E7D4F;box-shadow:0 0 0 3px #E7F2EA"></textarea>
        </label>
        <div style="display:flex;flex-direction:column;gap:6px">
          <span style="font-size:13.5px;font-weight:600;color:#23271F">Badge colour</span>
          <div style="display:flex;gap:8px">
            <span style="width:30px;height:30px;border-radius:9px;background:#2E7D4F;border:2px solid #1E4D33;cursor:pointer"></span>
            <span style="width:30px;height:30px;border-radius:9px;background:#D99E2B;cursor:pointer"></span>
            <span style="width:30px;height:30px;border-radius:9px;background:#7FA8D9;cursor:pointer"></span>
            <span style="width:30px;height:30px;border-radius:9px;background:#C08FBB;cursor:pointer"></span>
            <span style="width:30px;height:30px;border-radius:9px;background:#D9A08F;cursor:pointer"></span>
          </div>
        </div>
        <button style="padding:11px 0;border-radius:10px;background:#2E7D4F;color:#FFFFFF;font-weight:600;font-size:14px;border:none;cursor:pointer;font-family:inherit" style-hover="background:#256741">Add category</button>
      </div>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const active = { stBg: "#E7F2EA", stFg: "#1E4D33", status: "Active", toggle: "Archive" };
    const archived = { stBg: "#EDEAE0", stFg: "#6E7266", status: "Archived", toggle: "Restore" };
    return {
      cats: [
        { name: "Environment", desc: "Clean-ups, recycling drives, greening projects", count: "68", color: "#2E7D4F", ...active },
        { name: "Food Support", desc: "Food distribution, meal packing, grocery deliveries", count: "47", color: "#D99E2B", ...active },
        { name: "Elderly Support", desc: "Befriending, home visits, digital literacy help", count: "39", color: "#C08FBB", ...active },
        { name: "Education", desc: "Tutoring, reading programmes, enrichment support", count: "34", color: "#7FA8D9", ...active },
        { name: "Fundraising", desc: "Charity runs, bake sales, donation drives", count: "25", color: "#D9A08F", ...active },
        { name: "Blood Donation", desc: "Superseded — merged into Health & Wellness", count: "0", color: "#B9B5A8", ...archived },
      ],
    };
  }
}
</script>
</body>
</html>
