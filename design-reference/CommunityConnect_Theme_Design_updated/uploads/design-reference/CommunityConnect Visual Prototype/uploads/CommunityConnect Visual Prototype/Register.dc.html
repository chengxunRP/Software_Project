<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#F6F4EF;font-family:'Figtree',system-ui,sans-serif;color:#3C4038;-webkit-font-smoothing:antialiased}
a{color:#2E7D4F;text-decoration:none}
a:hover{color:#1E4D33}
*{box-sizing:border-box}
input::placeholder{color:#A5A294}
</style>
</helmet>

<div style="min-height:100vh;display:flex;flex-direction:column" data-screen-label="Registration Page">
  <header style="background:#FFFFFF;border-bottom:1px solid #E6E2D8">
    <div style="max-width:1120px;margin:0 auto;padding:0 32px;height:68px;display:flex;align-items:center;justify-content:space-between">
      <a href="Landing.dc.html" style="display:flex;align-items:center;gap:10px">
        <div style="width:34px;height:34px;border-radius:10px;background:#2E7D4F;color:#FFFFFF;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px">C</div>
        <div style="font-weight:700;font-size:18px;color:#23271F;letter-spacing:-0.01em">CommunityConnect <span style="color:#2E7D4F">SG</span></div>
      </a>
      <div style="font-size:14px;color:#6E7266">Already have an account? <a href="Login.dc.html" style="font-weight:600">Log in</a></div>
    </div>
  </header>

  <main style="flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px">
    <div style="width:480px;display:flex;flex-direction:column;gap:20px">
      <div style="display:flex;flex-direction:column;gap:6px;text-align:center">
        <h1 style="margin:0;font-size:28px;font-weight:800;color:#23271F;letter-spacing:-0.01em">Create your account</h1>
        <p style="margin:0;font-size:15px;color:#6E7266">Join 1,240 volunteers serving communities across Singapore.</p>
      </div>

      <div style="background:#FFFFFF;border:1px solid #E6E2D8;border-radius:16px;padding:28px;display:flex;flex-direction:column;gap:16px;box-shadow:0 1px 3px rgba(35,39,31,0.06)">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <label style="display:flex;flex-direction:column;gap:6px">
            <span style="font-size:13.5px;font-weight:600;color:#23271F">Full name</span>
            <input type="text" placeholder="Tan Wei Ling" style="padding:11px 14px;border-radius:10px;border:1px solid #D8D4C8;font-size:15px;font-family:inherit;background:#FDFCFA;color:#23271F;outline:none" style-focus="border-color:#2E7D4F;box-shadow:0 0 0 3px #E7F2EA"></input>
          </label>
          <label style="display:flex;flex-direction:column;gap:6px">
            <span style="font-size:13.5px;font-weight:600;color:#23271F">Mobile number</span>
            <input type="tel" placeholder="9123 4567" style="padding:11px 14px;border-radius:10px;border:1px solid #D8D4C8;font-size:15px;font-family:inherit;background:#FDFCFA;color:#23271F;outline:none" style-focus="border-color:#2E7D4F;box-shadow:0 0 0 3px #E7F2EA"></input>
          </label>
        </div>
        <label style="display:flex;flex-direction:column;gap:6px">
          <span style="font-size:13.5px;font-weight:600;color:#23271F">Email address</span>
          <input type="email" placeholder="you@example.sg" style="padding:11px 14px;border-radius:10px;border:1px solid #D8D4C8;font-size:15px;font-family:inherit;background:#FDFCFA;color:#23271F;outline:none" style-focus="border-color:#2E7D4F;box-shadow:0 0 0 3px #E7F2EA"></input>
        </label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <label style="display:flex;flex-direction:column;gap:6px">
            <span style="font-size:13.5px;font-weight:600;color:#23271F">Password</span>
            <input type="password" placeholder="Min. 8 characters" style="padding:11px 14px;border-radius:10px;border:1px solid #D8D4C8;font-size:15px;font-family:inherit;background:#FDFCFA;color:#23271F;outline:none" style-focus="border-color:#2E7D4F;box-shadow:0 0 0 3px #E7F2EA"></input>
          </label>
          <label style="display:flex;flex-direction:column;gap:6px">
            <span style="font-size:13.5px;font-weight:600;color:#23271F">Confirm password</span>
            <input type="password" placeholder="Re-enter password" style="padding:11px 14px;border-radius:10px;border:1px solid #D8D4C8;font-size:15px;font-family:inherit;background:#FDFCFA;color:#23271F;outline:none" style-focus="border-color:#2E7D4F;box-shadow:0 0 0 3px #E7F2EA"></input>
          </label>
        </div>
        <label style="display:flex;flex-direction:column;gap:6px">
          <span style="font-size:13.5px;font-weight:600;color:#23271F">I want to join as</span>
          <select style="padding:11px 14px;border-radius:10px;border:1px solid #D8D4C8;font-size:15px;font-family:inherit;background:#FDFCFA;color:#23271F;outline:none">
            <option>Volunteer</option>
            <option>Organiser (requires approval)</option>
          </select>
        </label>
        <label style="display:flex;align-items:flex-start;gap:8px;font-size:13.5px;color:#3C4038;line-height:1.5">
          <input type="checkbox" style="width:16px;height:16px;accent-color:#2E7D4F;margin-top:2px"></input>
          <span>I agree to the <a href="Register.dc.html" style="font-weight:600">Terms of Use</a> and consent to being contacted about events I register for.</span>
        </label>
        <a href="Volunteer Dashboard.dc.html" style="text-align:center;padding:12px 0;border-radius:11px;background:#2E7D4F;color:#FFFFFF;font-weight:600;font-size:15px" style-hover="background:#256741;color:#FFFFFF">Create account</a>
      </div>
    </div>
  </main>
</div>
</x-dc>
</body>
</html>
