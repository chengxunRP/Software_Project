<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Figtree',system-ui,sans-serif}
a{color:#2E7D4F;text-decoration:none}
a:hover{color:#1E4D33}
*{box-sizing:border-box}
</style>
</helmet>

<header style="position:sticky;top:0;z-index:60;background:rgba(255,255,255,0.94);backdrop-filter:blur(10px);border-bottom:1px solid #E6E2D8">
  <div style="max-width:1240px;margin:0 auto;padding:0 32px;height:70px;display:flex;align-items:center;justify-content:space-between;gap:24px">
    <a href="Landing.dc.html" style="display:flex;align-items:center;gap:10px;flex-shrink:0">
      <div style="width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,#2E7D4F,#1F8A7A);color:#FFFFFF;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;box-shadow:0 2px 6px rgba(30,77,51,0.25)">C</div>
      <div style="font-weight:800;font-size:18.5px;color:#23271F;letter-spacing:-0.01em">CommunityConnect <span style="color:#2E7D4F">SG</span></div>
      <sc-if value="{{ roleBadge }}" hint-placeholder-val="{{ false }}">
        <span style="margin-left:4px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:#1F8A7A;background:#E3F1EE;border:1px solid #C3E2DC;padding:4px 10px;border-radius:999px">{{ roleBadge }}</span>
      </sc-if>
    </a>

    <nav style="display:flex;align-items:center;gap:4px">
      <sc-for list="{{ links }}" as="l" hint-placeholder-count="4">
        <a href="{{ l.href }}" style="padding:9px 15px;border-radius:999px;font-size:14.5px;font-weight:600;transition:background 0.15s,color 0.15s;color:{{ l.color }};background:{{ l.bg }}" style-hover="color:#1E4D33;background:#EAF1E6">{{ l.label }}</a>
      </sc-for>
    </nav>

    <sc-if value="{{ isPublic }}" hint-placeholder-val="{{ true }}">
      <div style="display:flex;align-items:center;gap:12px;flex-shrink:0">
        <a href="Login.dc.html" style="padding:10px 18px;border-radius:11px;border:1.5px solid #D8D4C8;color:#23271F;font-weight:600;font-size:14px;background:#FFFFFF;transition:all 0.15s" style-hover="border-color:#2E7D4F;color:#1E4D33;background:#EAF1E6">Log in</a>
        <a href="Register.dc.html" style="padding:10px 20px;border-radius:11px;background:#2E7D4F;color:#FFFFFF;font-weight:600;font-size:14px;box-shadow:0 2px 8px rgba(46,125,79,0.3);transition:all 0.15s" style-hover="background:#256741;color:#FFFFFF;box-shadow:0 4px 12px rgba(46,125,79,0.4)">Register</a>
      </div>
    </sc-if>
    <sc-if value="{{ isLoggedIn }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex;align-items:center;gap:14px;flex-shrink:0">
        <a href="{{ dashboardHref }}" title="Notifications" style="position:relative;width:38px;height:38px;border-radius:50%;border:1px solid #E6E2D8;background:#FDFCFA;display:flex;align-items:center;justify-content:center;font-size:16px;color:#3C4038" style-hover="background:#EAF1E6;color:#1E4D33">🔔<span style="position:absolute;top:7px;right:8px;width:8px;height:8px;border-radius:50%;background:#E0704F;border:1.5px solid #FFFFFF"></span></a>
        <a href="{{ dashboardHref }}" style="display:flex;align-items:center;gap:9px;padding:5px 12px 5px 5px;border-radius:999px;border:1px solid #E6E2D8;background:#FDFCFA" style-hover="background:#EAF1E6;color:#1E4D33">
          <span style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#1F8A7A,#4A8FC2);color:#FFFFFF;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700">{{ initials }}</span>
          <span style="font-size:13.5px;font-weight:600;color:#23271F">{{ userName }}</span>
        </a>
        <a href="Landing.dc.html" style="font-size:13.5px;font-weight:600;color:#6E7266" style-hover="color:#B0433B">Log out</a>
      </div>
    </sc-if>
  </div>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1280, &quot;height&quot;: 90}, &quot;role&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;public&quot;, &quot;member&quot;, &quot;organiser&quot;, &quot;admin&quot;], &quot;default&quot;: &quot;public&quot;, &quot;tsType&quot;: &quot;string&quot;}, &quot;active&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;events&quot;, &quot;tsType&quot;: &quot;string&quot;}, &quot;userName&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Wei Ling&quot;, &quot;tsType&quot;: &quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const role = this.props.role ?? "public";
    const active = this.props.active ?? "";
    const userName = this.props.userName ?? "Wei Ling";
    const sets = {
      public: [
        { key: "events", label: "Browse Events", href: "Events.dc.html" },
        { key: "impact", label: "Our Impact", href: "Landing.dc.html#impact" },
      ],
      member: [
        { key: "dashboard", label: "Dashboard", href: "Volunteer Dashboard.dc.html" },
        { key: "events", label: "Browse Events", href: "Events.dc.html" },
        { key: "registrations", label: "My Registrations", href: "My Registrations.dc.html" },
        { key: "hours", label: "Volunteer Hours", href: "My Hours.dc.html" },
      ],
      organiser: [
        { key: "dashboard", label: "Dashboard", href: "Organiser Dashboard.dc.html" },
        { key: "manage", label: "Manage Events", href: "Manage Events.dc.html" },
        { key: "registrations", label: "Registrations", href: "Manage Registrations.dc.html" },
        { key: "roles", label: "Volunteer Roles", href: "Role Assignment.dc.html" },
        { key: "attendance", label: "Attendance", href: "Attendance.dc.html" },
      ],
      admin: [
        { key: "dashboard", label: "Dashboard", href: "Admin Dashboard.dc.html" },
        { key: "users", label: "Users", href: "User Management.dc.html" },
        { key: "categories", label: "Categories", href: "Categories.dc.html" },
        { key: "reports", label: "Reports", href: "Reports.dc.html" },
      ],
    };
    const dashHrefs = {
      member: "Volunteer Dashboard.dc.html",
      organiser: "Organiser Dashboard.dc.html",
      admin: "Admin Dashboard.dc.html",
    };
    const links = (sets[role] || sets.public).map((l) => ({
      ...l,
      color: l.key === active ? "#1E4D33" : "#4B5546",
      bg: l.key === active ? "#DCEBD8" : "transparent",
    }));
    const initials = userName.split(/\s+/).map((w) => w[0]).join("").slice(0, 2).toUpperCase();
    return {
      links,
      isPublic: role === "public",
      isLoggedIn: role !== "public",
      roleBadge: role === "organiser" ? "Organiser" : role === "admin" ? "Admin" : "",
      dashboardHref: dashHrefs[role] || "Landing.dc.html",
      userName,
      initials,
    };
  }
}
</script>
</body>
</html>
